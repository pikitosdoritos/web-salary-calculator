<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <div class="inputs">
            <label for="input-fields">Choose fields for input</label>
            <select name="inputs" id="input-fields" multiple>
                <option value="monthly">Monthly salary</option>
                <option value="daily">Daily salary</option>
                <option value="hourly">Hourly salary</option>
                <option value="dpm">Work days per month</option>
                <option value="hpd">Work hours per day</option>
            </select>
        </div>

        <form id="inputs">
            <div class="field" data-name="monthly" hidden>
                <label for="monthly">Month Salary</label>
                <input type="number" name="monthly" id="monthly">
            </div>

            <div class="field" data-name="daily" hidden>
                <label for="daily">Daily salary</label>
                <input type="number" name="daily" id="daily">
            </div>

            <div class="field" data-name="hourly" hidden>
                <label for="hourly">Hourly salary</label>
                <input type="number" name="hourly" id="hourly">
            </div>

            <div class="field" data-name="dpm" hidden>
                <label for="dpm">Work days per month</label>
                <input type="number" name="dpm" id="dpm">
            </div>

            <div class="field" data-name="hpd" hidden>
                <label for="hpd">Work hours per day</label>
                <input type="number" name="hpd" id="hpd">
            </div>
        </form>

        <div class="outputs">
            <label for="output-fields">Choose fields for output</label>
            <select name="outputs" id="output-fields" multiple>
                <option value="monthly">Monthly salary</option>
                <option value="daily">Daily salary</option>
                <option value="hourly">Hourly salary</option>
                <option value="dpm">Work days per month</option>
                <option value="hpd">Work hours per day</option>
            </select>
        </div>

        <form id="outputs">
            <div class="row" hidden>
                <label>Month Salary</label>
                <output name="monthly"></output>
            </div>

            <div class="row" hidden>
                <label>Daily salary</label>
                <output name="daily"></output>
            </div>

            <div class="row" hidden>
                <label>Hourly salary</label>
                <output name="hourly"></output>
            </div>

            <div class="row" hidden>
                <label>Work days per month</label>
                <output name="dpm"></output>
            </div>

            <div class="row" hidden>
                <label>Work hours per day</label>
                <output name="hpd"></output>
            </div>
        </form>

        <button form="input-form">Calculate</button>
    </main>
</body>

</html>
